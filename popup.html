<!DOCTYPE html>
<!--
  Step 2 popup. Same lifecycle rules as step 1 (born on click, dies on
  blur, JS re-runs from scratch every open), but now it's mostly a
  TRIGGER: the Jump button doesn't do the jumping itself. It fires a
  message to the service worker and lets the worker do the durable work,
  because the worker outlives this popup. See popup.js and
  service-worker.js for the why.

  The counts shown here (seen / total) are read FRESH every time the
  popup opens — that's the reliable way to observe state that the worker
  changed, since the popup can't count on being alive after a jump.
-->
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .value { margin: 2px 0 12px; word-break: break-all; }
    #jump {
      display: block; width: 100%;
      padding: 12px; margin: 4px 0 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      border: 1px solid #888; border-radius: 8px;
      background: #f5f5f5;
    }
    #jump:hover { background: #ececec; }
    .row { display: flex; justify-content: space-between; align-items: baseline; }
    .small { font-size: 12px; color: #888; }
    #reset { font-size: 12px; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>JumpAround 🎲</h1>

  <!-- The star of step 2. -->
  <button id="jump">Jump →</button>

  <div class="row">
    <span class="small" id="progress">seen 0 of 0</span>
    <button id="reset">reset history</button>
  </div>

  <div class="label">Current tab</div>
  <div class="value small" id="current-url">loading…</div>

  <!-- Foreshadowing step 3: the identity we minted on install. -->
  <div class="label">Your client id</div>
  <div class="value small" id="client-uuid">loading…</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
