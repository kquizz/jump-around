<!DOCTYPE html>
<!--
  Step 3 popup. Still the same lifecycle as before (born on click, dies on
  blur, JS re-runs from scratch each open), and still a thin TRIGGER: the
  buttons fire messages to the service worker, which does the durable work.

  What's new in step 3 is the extra UI: besides Jump, you can now
  Recommend the page you're on and Report a bad one, and pick which tags
  you want jumps filtered to. The tag lists are fetched live from the API's
  /tags endpoint every time the popup opens.

  Panels (Recommend / Report / Filter) start hidden and toggle open — that
  keeps the default view a single big Jump button, like StumbleUpon.
-->
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 16px;
    }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .value { margin: 2px 0 12px; word-break: break-all; }
    #jump {
      display: block; width: 100%;
      padding: 12px; margin: 4px 0 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer;
      border: 1px solid #888; border-radius: 8px;
      background: #f5f5f5;
    }
    #jump:hover { background: #ececec; }
    .row { display: flex; justify-content: space-between; align-items: baseline; }
    .small { font-size: 12px; color: #888; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .linkbtn {
      background: none; border: none; color: #35a; cursor: pointer;
      font-size: 13px; padding: 4px 0;
    }
    .linkbtn:hover { text-decoration: underline; }
    .panel { display: none; margin: 6px 0 4px; }
    .panel.open { display: block; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px 10px; margin: 6px 0; }
    .tags label { font-size: 12px; display: inline-flex; align-items: center; gap: 3px; }
    .primary {
      padding: 6px 10px; border: 1px solid #888; border-radius: 6px;
      background: #f5f5f5; cursor: pointer; font-size: 13px;
    }
    .primary:hover { background: #ececec; }
    input[type=text] { width: 100%; padding: 6px; box-sizing: border-box; margin: 4px 0; }
    .status { font-size: 12px; margin-top: 6px; min-height: 14px; }
    .status.ok { color: #2a7; }
    .status.err { color: #c33; }
    #reset { font-size: 12px; padding: 4px 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>JumpAround 🎲</h1>

  <button id="jump">Jump →</button>

  <div class="row">
    <span class="small" id="progress">0 seen</span>
    <button id="reset">reset history</button>
  </div>

  <hr />

  <!-- Recommend the current page -->
  <button class="linkbtn" id="show-recommend">➕ Recommend this page</button>
  <div class="panel" id="recommend-panel">
    <div class="label">Tag it (optional)</div>
    <div class="tags" id="rec-tags"><span class="small">loading tags…</span></div>
    <button class="primary" id="rec-submit">Submit recommendation</button>
    <div class="status" id="rec-status"></div>
  </div>

  <!-- Report the page we last jumped to -->
  <button class="linkbtn" id="show-report">⚑ Report this page</button>
  <div class="panel" id="report-panel">
    <input type="text" id="rep-reason" placeholder="what's wrong with it? (optional)" />
    <button class="primary" id="rep-submit">Send report</button>
    <div class="status" id="rep-status"></div>
  </div>

  <hr />

  <!-- Filter which tags jumps are drawn from -->
  <button class="linkbtn" id="show-filter">⚙ Filter tags</button>
  <div class="panel" id="filter-panel">
    <div class="small">Only jump to these tags (none checked = everything):</div>
    <div class="tags" id="filter-tags"><span class="small">loading tags…</span></div>
  </div>

  <hr />

  <div class="label">Your client id</div>
  <div class="value small" id="client-uuid">loading…</div>

  <script type="module" src="popup.js"></script>
</body>
</html>
